name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::630764144880:role/prod-orbfall-deploy
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync ./dist s3://gusto4tech-prod-orbfall-static/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync ./dist s3://gusto4tech-prod-orbfall-static/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1FSXOLSCUJUU3 \
            --paths "/orbfall/*"
